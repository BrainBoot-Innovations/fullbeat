<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullBeat — Test. Track. Ship.</title>
    <link rel="stylesheet" href="css/styles.css?v=20260325h">
</head>
<body>
    <!-- Login Container -->
    <div class="login-container">
        <div class="login-header">
            <h1 class="brand-logo">FULLBEAT</h1>
            <p class="tagline">Test. Track. Ship.</p>
            <p class="brand-sub">by BrainBoot Innovations</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="login-form">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="you@brainboot.co.in" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter password" required>
            </div>
            <div id="login-error" class="form-error"></div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Sign In</button>
        </form>

        <!-- Password Change Form (hidden by default) -->
        <form id="password-change-form" class="login-form" style="display:none">
            <h3>Change Your Password</h3>
            <p class="text-muted">First login — please set a new password</p>
            <div class="form-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" placeholder="Min 8 chars, 1 upper, 1 number" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm password" required>
            </div>
            <div id="password-error" class="form-error"></div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Set Password</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-config.js?v=20260325h"></script>
    <script src="js/auth.js?v=20260325h"></script>
    <script>
    // On load: if DEV_MODE or already logged in, go to dashboard
    (async () => {
        if (typeof DEV_MODE !== 'undefined' && DEV_MODE) {
            // If user just logged out, stay on login page
            if (sessionStorage.getItem('fullbeat_logged_out')) {
                sessionStorage.removeItem('fullbeat_logged_out');
                // Stay on login page — don't redirect
            } else {
                window.location.href = 'dashboard.html';
                return;
            }
        }
        if (supabase && supabase.auth) {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
                return;
            }
        }
    })();

    // Login form handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('login-error');
        errorEl.textContent = '';
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        try {
            const data = await login(email, password);
            const profile = await getUserProfile(data.user.id);
            if (profile && profile.must_change_password) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('password-change-form').style.display = 'block';
                window._userId = data.user.id;
            } else {
                window.location.href = 'dashboard.html';
            }
        } catch (err) {
            errorEl.textContent = err.message || 'Login failed';
        }
    });

    // Password change handler
    document.getElementById('password-change-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('password-error');
        errorEl.textContent = '';
        const newPw = document.getElementById('new-password').value;
        const confirmPw = document.getElementById('confirm-password').value;

        if (newPw !== confirmPw) {
            errorEl.textContent = 'Passwords do not match';
            return;
        }
        const pwErr = validatePassword(newPw);
        if (pwErr) {
            errorEl.textContent = pwErr;
            return;
        }
        try {
            await changePassword(newPw);
            await markPasswordChanged(window._userId);
            window.location.href = 'dashboard.html';
        } catch (err) {
            errorEl.textContent = err.message;
        }
    });
    </script>
</body>
</html>
