<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FullBeat — QA Lifecycle Platform</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
    color: white;
  }
  .card {
    text-align: center;
    padding: 60px 40px;
    max-width: 500px;
  }
  .logo {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 16px;
    opacity: 0.8;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .status {
    font-size: 14px;
    opacity: 0.7;
    line-height: 1.8;
  }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }
  .by {
    margin-top: 40px;
    font-size: 11px;
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">FULLBEAT</div>
    <div class="tagline">Test. Track. Ship.</div>
    <div class="badge">COMING SOON</div>
    <div class="status">
      BrainBoot's internal QA lifecycle platform.<br>
      Test Case Repository &bull; Test Plans &bull; Execution Tracking &bull; Bug Management
    </div>
    <div class="by">BrainBoot Innovations Pvt Ltd</div>
  </div>
</body>
</html>
